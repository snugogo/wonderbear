<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cod de verificare {{brand}}</title>
</head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#faf7f2;color:#2b2b2b;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#faf7f2;padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="480" style="background:#ffffff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden;">
          <tr>
            <td style="padding:32px 36px 8px 36px;">
              <h1 style="margin:0;font-size:22px;font-weight:700;color:#ff9442;">{{brand}}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 36px 0 36px;">
              <p style="margin:0 0 12px 0;font-size:15px;line-height:1.6;color:#4a4a4a;">Salut,</p>
              <p style="margin:0 0 24px 0;font-size:15px;line-height:1.6;color:#4a4a4a;">
                Folosești acest cod pentru a <strong>{{purposeWord}}</strong>. Iată codul tău de verificare:
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:8px 36px 24px 36px;">
              <div style="display:inline-block;padding:16px 28px;background:#fff3e0;border-radius:10px;font-size:32px;font-weight:700;letter-spacing:8px;color:#ff9442;font-family:'SF Mono',Menlo,Consolas,monospace;">
                {{code}}
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 36px 24px 36px;">
              <p style="margin:0 0 8px 0;font-size:14px;line-height:1.6;color:#7a7a7a;">
                Codul va expira în <strong>{{expiresMin}}</strong> minute.
              </p>
              <p style="margin:0;font-size:14px;line-height:1.6;color:#7a7a7a;">
                Dacă nu ai cerut acest cod, poți ignora acest e-mail.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 36px 32px 36px;border-top:1px solid #f0ebe3;">
              <p style="margin:0;font-size:12px;line-height:1.5;color:#a0a0a0;">
                © {{year}} {{brand}} · Povești de seară cu Ursulețul
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
