version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: wonderbear_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wonderbear
      POSTGRES_PASSWORD: wonderbear123
      POSTGRES_DB: wonderbear_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wonderbear -d wonderbear_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: wonderbear_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
